<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marlene Rodrigues da Conceição — In Memoriam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#F5F0E6}

/* ── Grain de filme ── */
body::after{
  content:'';position:fixed;inset:0;z-index:900;pointer-events:none;
  opacity:.045;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23g)'/></svg>");
  background-size:200px 200px;
}

/* ── Palco ── */
#stage{position:fixed;inset:0}

.slide{
  position:absolute;inset:0;
  opacity:0;transition:opacity 2.4s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.slide.active{opacity:1;z-index:2}

/* ── Foto de fundo ── */
.bg{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center center;
  will-change:transform;
}
.bg.grayscale{filter:grayscale(1) contrast(1.08) brightness(.8)}
.bg.blur-heavy{filter:blur(14px) brightness(.45);transform:scale(1.08)}
.bg.dark-veil {filter:brightness(.28)}

/* ── Vídeo Veo de fundo ── */
.bg-video{position:absolute;inset:0;overflow:hidden}
.bg-video video{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  object-fit:cover;
}
.bg-video.grayscale video{filter:grayscale(1) contrast(1.08) brightness(.8)}

/* ── Ken Burns ── */
@keyframes kb-zoom   {from{transform:scale(1)}                              to{transform:scale(1.12)}}
@keyframes kb-face   {from{transform:scale(1)   translate(0,0)}             to{transform:scale(1.55) translate(-3%,-6%)}}
@keyframes kb-hands  {from{transform:scale(1)   translate(0,0)}             to{transform:scale(1.6)  translate(0,14%)}}
@keyframes kb-left   {from{transform:scale(1)   translate(0,0)}             to{transform:scale(1.15) translate(-4%,0)}}
@keyframes kb-right  {from{transform:scale(1)   translate(0,0)}             to{transform:scale(1.15) translate(4%,0)}}
.slide.active .bg.kb      {animation:kb-zoom  24s ease-out both}
.slide.active .bg.kb-face {animation:kb-face  30s ease-out both}
.slide.active .bg.kb-hands{animation:kb-hands 30s ease-out both}
.slide.active .bg.kb-left {animation:kb-left  22s ease-out both}
.slide.active .bg.kb-right{animation:kb-right 22s ease-out both}

/* ── Vignetagem ── */
.vignette{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 75% 75% at 50% 50%, transparent 40%, rgba(0,0,0,.82) 100%);
}

/* ── Overlays ── */
.ov-none    {display:none}
.ov-soft    {position:absolute;inset:0;z-index:4;background:rgba(0,0,0,.28)}
.ov-med     {position:absolute;inset:0;z-index:4;background:rgba(0,0,0,.52)}
.ov-hard    {position:absolute;inset:0;z-index:4;background:rgba(0,0,0,.78)}
.ov-bot     {position:absolute;inset:0;z-index:4;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.5) 35%,rgba(0,0,0,.06) 65%)}
.ov-top     {position:absolute;inset:0;z-index:4;background:linear-gradient(to bottom,rgba(0,0,0,.80) 0%,rgba(0,0,0,.1) 50%,rgba(0,0,0,.55) 100%)}
.ov-full    {position:absolute;inset:0;z-index:4;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.22) 50%,rgba(0,0,0,.72) 100%)}
.ov-scene   {position:absolute;inset:0;z-index:4;background:linear-gradient(135deg,rgba(18,8,2,.65) 0%,rgba(0,0,0,.30) 50%,rgba(15,5,0,.60) 100%)}

/* ── Camada de texto ── */
.tl{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7vw 8vw;text-align:center}
.tl-bot{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:82%}
.tl-top{position:absolute;top:64px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:70%}
.tl-left{position:absolute;bottom:72px;left:52px;z-index:10;text-align:left;max-width:44%}

/* Glass backdrop para legibilidade */
.glass{
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:18px 28px;border-radius:4px;
  border:1px solid rgba(212,168,87,.15);
}

/* ── Animações de entrada ── */
@keyframes fade-up  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in  {from{opacity:0}                             to{opacity:1}}
@keyframes scale-in {from{opacity:0;transform:scale(.92)}        to{opacity:1;transform:scale(1)}}
@keyframes expand   {from{width:0}                               to{width:100%}}
@keyframes pulse-gold{0%,100%{opacity:.5}50%{opacity:1}}

.appear,.appear-2,.appear-3,.appear-4{opacity:0}
.running .appear  {animation:fade-up 2s          ease forwards}
.running .appear-2{animation:fade-up 2s  1.0s    ease forwards}
.running .appear-3{animation:fade-up 2s  2.0s    ease forwards}
.running .appear-4{animation:fade-up 2s  3.0s    ease forwards}
.running .appear-scale{animation:scale-in 2.2s   ease forwards}
.running .appear-slow {animation:fade-in  3.5s 0.8s ease forwards;opacity:0}

/* ── Linha divisora dourada ── */
.gold-line{
  display:block;height:1px;background:linear-gradient(90deg,transparent,#D4A857,transparent);
  margin:16px auto;opacity:0;
}
.running .gold-line{animation:expand 1.8s .5s ease forwards,fade-in 1.8s .5s ease forwards}

.t-chapter-ato{
  font-family:'Cinzel',Georgia,serif;
  font-size:clamp(11px,1.1vw,16px);font-weight:400;
  color:rgba(212,168,87,.7);letter-spacing:.38em;text-transform:uppercase;
  margin-bottom:10px;
}
.t-chapter-title{
  font-family:'Cinzel',Georgia,serif;
  font-size:clamp(16px,2.2vw,32px);font-weight:600;

}
.t-name{

}
.t-dates{
  font-family:'Cinzel',Georgia,serif;

}
.t-memoriam{
  font-family:'Cinzel',Georgia,serif;

.t-memoriam-name{
  font-family:'Cormorant Garamond',Georgia,serif;

  text-shadow:0 2px 24px rgba(0,0,0,.95);
}
.t-narrativa{
  font-family:'EB Garamond','Cormorant Garamond',Georgia,serif;
  font-size:clamp(14px,1.6vw,24px);font-weight:400;font-style:italic;
  color:rgba(245,240,230,.9);letter-spacing:.03em;line-height:1.7;
}
.t-quote{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(14px,1.7vw,26px);font-weight:400;font-style:italic;

.t-attribution{
  font-family:'Cinzel',Georgia,serif;

}
.t-frase{
  font-family:'Cormorant Garamond',Georgia,serif;

  text-shadow:0 2px 28px rgba(0,0,0,.9);
}
.t-honrar{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(18px,2.4vw,38px);font-weight:300;font-style:italic;
  color:#F5F0E6;text-align:center;line-height:1.6;
}
.t-dedicatoria{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(14px,1.7vw,26px);font-weight:300;font-style:italic;
  color:rgba(245,240,230,.85);letter-spacing:.04em;margin-top:16px;
}

/* ── Ornamentos SVG ── */
.orn{position:absolute;z-index:12;pointer-events:none;opacity:0}
.orn-bl{bottom:28px;left:28px}
.orn-br{bottom:28px;right:28px;transform:scaleX(-1)}
.orn-tl{top:28px;left:28px}
.orn-tr{top:28px;right:28px;transform:scaleX(-1)}
.orn-tc{top:20px;left:50%;transform:translateX(-50%)}
.orn-bc{bottom:20px;left:50%;transform:translateX(-50%)}
.running .orn{animation:fade-in 3s 0.8s ease forwards}

/* ── Player de vídeo ── */
#video-player{
  position:fixed;inset:0;z-index:600;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
#video-player video{
  width:100%;height:100%;object-fit:contain;
}
#video-player .vp-close{
  position:absolute;top:20px;right:24px;z-index:10;cursor:pointer;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(245,240,230,.35);border:1px solid rgba(245,240,230,.15);
  padding:8px 16px;border-radius:2px;transition:all .3s;background:rgba(0,0,0,.5);
}
#video-player .vp-close:hover{color:#F5F0E6;border-color:rgba(245,240,230,.4)}

/* ── Tela de início ── */
#start{
  position:fixed;inset:0;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:800;transition:opacity 2.5s ease;
}
#start.hide{opacity:0;pointer-events:none}
#start-bg{
  position:absolute;inset:0;
  background-image:url('assets/IMG_20241027_144232221_HDR_PORTRAIT.jpg');
  background-size:cover;background-position:center 20%;
  filter:blur(22px) brightness(.22) saturate(.4);
  transform:scale(1.06);
}
#start-content{position:relative;z-index:2;text-align:center;padding:0 40px}

  font-family:'Cinzel',Georgia,serif;
  font-weight:600;color:#F5F0E6;
  font-size:clamp(14px,1.6vw,22px);letter-spacing:.38em;
  text-transform:uppercase;color:rgba(212,168,87,.8);
  animation:fade-up 2.5s ease both;margin-bottom:22px;

#start h2{

  text-shadow:0 2px 40px rgba(0,0,0,.8);
}
#start .sub{
  font-family:'Cinzel',Georgia,serif;font-weight:400;
  color:rgba(245,240,230,.4);font-size:clamp(10px,1.1vw,16px);
  letter-spacing:.18em;margin-top:14px;text-transform:uppercase;
  animation:fade-up 2.5s .8s ease both;
}
#start .btns{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  margin-top:48px;
  animation:fade-up 2.5s 1.4s ease both;
}
.start-btn{
  font-family:'Cinzel',serif;font-size:10px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  padding:12px 28px;border-radius:2px;border:none;
  transition:all .3s ease;
}
.start-btn-primary{
  background:rgba(212,168,87,.14);color:#D4A857;
  border:1px solid rgba(212,168,87,.38);
}
.start-btn-primary:hover{background:rgba(212,168,87,.26);border-color:#D4A857}
.start-btn-secondary{
  background:transparent;color:rgba(245,240,230,.38);
  border:1px solid rgba(245,240,230,.15);
}
.start-btn-secondary:hover{color:#F5F0E6;border-color:rgba(245,240,230,.38)}
#start .divider{
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,#D4A857,transparent);
  margin:18px auto;opacity:.5;
  animation:fade-in 2.5s 1s ease both;
}

/* ── Barra de progresso ── */
#bar-track{position:fixed;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:100}
#bar{height:100%;background:linear-gradient(90deg,rgba(212,168,87,.4),#D4A857);width:0;transition:width .3s linear}
.chapter-dot{
  position:absolute;top:50%;transform:translateY(-50%);
  width:5px;height:5px;border-radius:50%;background:#D4A857;opacity:.45;
}

/* ── Carregando ── */
#loader{
  position:fixed;inset:0;background:#000;z-index:700;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 1.5s ease;
}
#loader.hide{opacity:0;pointer-events:none}
#loader span{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:.3em;
  color:rgba(212,168,87,.5);text-transform:uppercase;
  animation:pulse-gold 1.6s ease infinite;
}
</style>

// CONSTRUÇÃO DO DOM
// ══════════════════════════════════════════════════════════════════════════════
const stage = document.getElementById('stage');

SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.id = 'sl' + i;

  // Vignette presente em todos os slides com foto/video
  if (s.bg || s.video) {
    div.insertAdjacentHTML('beforeend', '<div class="vignette"></div>');
  }

  // Fundo: vídeo Veo
  if (s.video) {
    const vc = document.createElement('div');
    vc.className = 'bg-video' + (s.videoClass ? ' '+s.videoClass : '');
    vc.innerHTML = `<video autoplay muted loop playsinline><source src="${s.video}" type="video/mp4"></video>`;
    div.insertBefore(vc, div.firstChild);
  }
  // Fundo: foto estática
  else if (s.bg) {
    const bg = document.createElement('div');
    bg.className = 'bg ' + (s.bgClass || '');
    bg.style.backgroundImage = `url('${s.bg}')`;
    bg.style.backgroundPosition = s.pos || 'center center';
    div.insertBefore(bg, div.firstChild);
  }

  // Overlay
  if (s.overlay) {
    div.insertAdjacentHTML('beforeend', `<div class="ov-${s.overlay}"></div>`);
  }

  // Conteúdo HTML
  if (s.content) {
    div.insertAdjacentHTML('beforeend', s.content);
  }

  // Ornamentos de canto
  if (s.ornBL) div.insertAdjacentHTML('beforeend', `<div class="orn orn-bl">${SVG_RAMO}</div>`);
  if (s.ornBR) div.insertAdjacentHTML('beforeend', `<div class="orn orn-br">${SVG_RAMO}</div>`);
  if (s.ornTL) div.insertAdjacentHTML('beforeend', `<div class="orn orn-tl">${SVG_CORNER}</div>`);
  if (s.ornTR) div.insertAdjacentHTML('beforeend', `<div class="orn orn-tr">${SVG_CORNER}</div>`);
  if (s.ornT)  div.insertAdjacentHTML('beforeend', `<div class="orn orn-tc">${SVG_MOLDURA}</div>`);

  stage.appendChild(div);
});

// ══════════════════════════════════════════════════════════════════════════════
// MARCADORES DE CAPÍTULO NA BARRA DE PROGRESSO
// ══════════════════════════════════════════════════════════════════════════════
const DURATION = 320;
const CHAPTER_TIMES = [0, 47, 141, 251]; // início dos 4 atos
const barTrack = document.getElementById('bar-track');
CHAPTER_TIMES.forEach(t => {
  const dot = document.createElement('div');
  dot.className = 'chapter-dot';
  dot.style.left = (t / DURATION * 100) + '%';
  barTrack.appendChild(dot);
});

// ══════════════════════════════════════════════════════════════════════════════
// MOTOR DE TIMING
// ══════════════════════════════════════════════════════════════════════════════
const audio  = document.getElementById('audio');
const barEl  = document.getElementById('bar');
let activeIdx = -1;

function restartKB(el) {
  const bg = el.querySelector('.bg.kb, .bg.kb-face, .bg.kb-hands, .bg.kb-left, .bg.kb-right');
  if (!bg) return;
  bg.style.animation = 'none';
  void bg.offsetHeight;
  bg.style.animation = '';
}

function tick() {
  const t = audio.currentTime;

  barEl.style.width = Math.min(100, (t / DURATION) * 100) + '%';

  let target = -1;
  for (let i = 0; i < SLIDES.length; i++) {
    if (t >= SLIDES[i].start && t < SLIDES[i].end) { target = i; break; }
  }

  if (target !== activeIdx) {
    if (activeIdx >= 0) {
      const prev = document.getElementById('sl' + activeIdx);
      prev.classList.remove('active', 'running');
      // pausa vídeos do slide anterior
      prev.querySelectorAll('video').forEach(v => { v.pause(); v.currentTime = 0; });
    }
    if (target >= 0) {
      const cur = document.getElementById('sl' + target);
      restartKB(cur);
      cur.classList.add('active');
      // retoma vídeos do slide atual
      cur.querySelectorAll('video').forEach(v => v.play().catch(()=>{}));
      setTimeout(() => cur.classList.add('running'), 420);
    }
    activeIdx = target;
  }

  requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════════════════════════════════
// INÍCIO
// ══════════════════════════════════════════════════════════════════════════════
audio.addEventListener('canplaythrough', () => {
  const loader = document.getElementById('loader');
  loader.classList.add('hide');
  setTimeout(() => loader.style.display = 'none', 1600);
}, { once: true });

// fallback: remove loader após 4s mesmo sem canplaythrough
setTimeout(() => {
  const loader = document.getElementById('loader');
  if (loader) { loader.classList.add('hide'); setTimeout(() => loader.style.display='none', 1600); }
}, 4000);

function iniciar() {
  const startEl = document.getElementById('start');
  startEl.classList.add('hide');
  setTimeout(() => startEl.style.display = 'none', 2600);
  audio.play().catch(() => {});
  requestAnimationFrame(tick);
}

function assistirVideo() {
  const startEl = document.getElementById('start');
  const player  = document.getElementById('video-player');
  const vid     = document.getElementById('vid');
  startEl.classList.add('hide');
  setTimeout(() => startEl.style.display = 'none', 2600);
  player.style.display = 'flex';
  vid.play().catch(() => {});
}

function fecharVideo() {
  const player = document.getElementById('video-player');
  const vid    = document.getElementById('vid');
  vid.pause();
  player.style.display = 'none';
  // volta à tela de início
  const startEl = document.getElementById('start');
  startEl.style.display = 'flex';
  startEl.classList.remove('hide');
}

// ── Teclas ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') audio.currentTime = Math.min(audio.duration||DURATION, audio.currentTime + 10);
  if (e.key === 'ArrowLeft')  audio.currentTime = Math.max(0, audio.currentTime - 10);
  if (e.key === ' ')          { e.preventDefault(); audio.paused ? audio.play() : audio.pause(); }
  if (e.key === 'f' || e.key === 'F') {
    !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen();
  }
  // Pular para o início de cada ato: 1–4
  if (e.key === '1') audio.currentTime = 0;
  if (e.key === '2') audio.currentTime = 47;
  if (e.key === '3') audio.currentTime = 141;
  if (e.key === '4') audio.currentTime = 251;
});
